name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.3)'
        required: true
        type: string
  push:
    tags:
      - 'v*'
      - 'GBPOS'
      - 'GBPOS-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SHOP_LOGIN_USERNAME: ${{ vars.VITE_SHOP_LOGIN_USERNAME || secrets.VITE_SHOP_LOGIN_USERNAME || 'Gadgetboyz' }}
      VITE_SHOP_LOGIN_EMAIL: ${{ vars.VITE_SHOP_LOGIN_EMAIL || secrets.VITE_SHOP_LOGIN_EMAIL }}
      GBPOS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.GBPOS_ANDROID_KEYSTORE_PASSWORD }}
      GBPOS_ANDROID_KEY_ALIAS: ${{ secrets.GBPOS_ANDROID_KEY_ALIAS }}
      GBPOS_ANDROID_KEY_PASSWORD: ${{ secrets.GBPOS_ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Ensure Android SDK packages
        shell: pwsh
        run: |
          & "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat" "platforms;android-36" "build-tools;36.0.0"

      - name: Install deps
        run: npm ci

      - name: Generate icon
        run: node tools/generate-icon.cjs

      - name: Typecheck renderer
        run: npx tsc -p tsconfig.json --noEmit

      - name: Typecheck electron main
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build electron main
        run: npx tsc --project tsconfig.electron.json

      - name: Validate Supabase build config
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_URL)) {
            throw "Missing VITE_SUPABASE_URL. Add it in GitHub repo Settings > Secrets and variables > Actions."
          }
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_PUBLISHABLE_KEY)) {
            throw "Missing VITE_SUPABASE_PUBLISHABLE_KEY. Add it in GitHub repo Settings > Secrets and variables > Actions."
          }
          if ([string]::IsNullOrWhiteSpace($env:VITE_SHOP_LOGIN_EMAIL)) {
            throw "Missing VITE_SHOP_LOGIN_EMAIL. Add the Supabase Auth email that Gadgetboyz should sign into."
          }

      - name: Build renderer (Vite)
        run: npx vite build --config vite.config.ts

      - name: Package installer (electron-builder)
        run: npx electron-builder --win nsis --publish never

      - name: Record release version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $setup = Join-Path 'release' "Windows-Installer-x64-$version.exe"
          if (-not (Test-Path $setup)) { throw "Setup installer not found: $setup" }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Android APK
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ secrets.GBPOS_ANDROID_KEYSTORE_BASE64 }}')) {
            throw 'Missing GBPOS_ANDROID_KEYSTORE_BASE64 GitHub secret.'
          }
          $keyStorePath = Join-Path $env:RUNNER_TEMP 'gadgetboy-pos-release.jks'
          [IO.File]::WriteAllBytes($keyStorePath, [Convert]::FromBase64String('${{ secrets.GBPOS_ANDROID_KEYSTORE_BASE64 }}'))
          $env:GBPOS_ANDROID_KEYSTORE_PATH = $keyStorePath
          npm.cmd run android:sync
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Push-Location android
          .\gradlew.bat assembleRelease
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location
          $version = $env:RELEASE_VERSION
          $apkSource = 'android/app/build/outputs/apk/release/app-release.apk'
          if (-not (Test-Path $apkSource)) { throw "Android APK not found: $apkSource" }
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Force $apkSource "release/Android-APK-universal-$version.apk"

      - name: Generate release notes from CHANGELOG
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION
          if (-not $version) { throw "RELEASE_VERSION is not set" }
          node -e "const fs=require('fs'); const v=process.env.RELEASE_VERSION; const raw=fs.readFileSync('CHANGELOG.md','utf8').replace(/\r\n/g,'\n'); const head=new RegExp('^## v'+v.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&')+'\\b.*$','m'); const m=head.exec(raw); if(!m){ console.log('## v'+v+'\n\n- (No changelog section found)'); process.exit(0);} const start=m.index; const after=raw.slice(start); const next=after.slice(3).search(/^## v/m); const section=next>=0? after.slice(0, 3+next): after; const lines=section.split('\n'); const title=lines.shift(); const body=lines.join('\n').trim(); console.log((title||('## v'+v)).trim()+'\n\n'+(body||'- (No entries)')+'\n');" | Out-File -FilePath release-notes.md -Encoding utf8
          "RELEASE_NOTES_PATH=release-notes.md" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: List release artifacts
        run: |
          echo "Release folder contents:"
          dir release

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          make_latest: 'true'
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: |
            release/Windows-Installer-x64-${{ env.RELEASE_VERSION }}.exe
            release/Windows-Installer-x64-${{ env.RELEASE_VERSION }}.exe.blockmap
            release/Android-APK-universal-${{ env.RELEASE_VERSION }}.apk
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
