name: Build & Release (Windows)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.3)'
        required: true
        type: string
  push:
    tags:
      - 'v*'
      - 'GBPOS'
      - 'GBPOS-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate icon
        run: node tools/generate-icon.cjs

      - name: Typecheck renderer
        run: npx tsc -p tsconfig.json --noEmit

      - name: Typecheck electron main
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build electron main
        run: npx tsc --project tsconfig.electron.json

      - name: Build renderer (Vite)
        run: npx vite build --config vite.config.ts

      - name: Package installer (electron-builder)
        run: npx electron-builder --win nsis --publish never

      - name: Create "Update" installer alias
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $setup = Join-Path 'release' "GadgetBoy-POS-Setup-$version.exe"
          if (-not (Test-Path $setup)) { throw "Setup installer not found: $setup" }
          $update = Join-Path 'release' "GadgetBoy-POS-Update-$version.exe"
          Copy-Item -Force $setup $update
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: List release artifacts
        run: |
          echo "Release folder contents:"
          dir release

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            release/GadgetBoy-POS-Setup-${{ env.RELEASE_VERSION }}.exe
            release/GadgetBoy-POS-Setup-${{ env.RELEASE_VERSION }}.exe.blockmap
            release/GadgetBoy-POS-Update-${{ env.RELEASE_VERSION }}.exe
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
