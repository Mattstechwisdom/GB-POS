<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GadgetBoy POS</title>
    <!-- Development CSP: relaxed for Vite HMR; tighten for production build -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:5173; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http: https: ws: wss: http://localhost:5173 ws://localhost:5173; frame-src 'self' blob:; child-src 'self' blob:;" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #18181b;
        color: #e4e4e7;
      }
      #gbpos-initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #18181b;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      #gbpos-initial-loader img {
        width: 112px;
        height: 112px;
        object-fit: contain;
        animation: gbposPulse 1.2s ease-in-out infinite;
      }
      #gbpos-initial-loader .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #gbpos-initial-loader .label {
        font-size: 13px;
        letter-spacing: .06em;
        color: #a1a1aa;
      }
      #gbpos-initial-loader .dots {
        display: flex;
        gap: 4px;
        transform: translateY(1px);
      }
      #gbpos-initial-loader .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #39FF14;
        opacity: .45;
        animation: gbposBounce 1s ease-in-out infinite;
      }
      #gbpos-initial-loader .dot:nth-child(2) { animation-delay: .18s; }
      #gbpos-initial-loader .dot:nth-child(3) { animation-delay: .36s; }
      @keyframes gbposBounce {
        0%, 80%, 100% { transform: translateY(0); opacity: .45; }
        40% { transform: translateY(-5px); opacity: 1; }
      }
      @keyframes gbposPulse {
        0%, 100% { transform: scale(1); opacity: .92; }
        50% { transform: scale(1.03); opacity: 1; }
      }
    </style>
  </head>
  <body class="dark">
    <div id="gbpos-initial-loader" aria-label="Loading">
      <img src="logo.png" alt="GadgetBoy POS" />
      <div class="row">
        <span class="label">LOADING</span>
        <span class="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
